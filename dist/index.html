
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f3f4f6">
    <meta name="apple-mobile-web-app-title" content="AuraPrep">
    <title>AuraPrep</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/app-icon.png?v=2">
    <link rel="icon" type="image/png" href="/app-icon.png?v=2">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&family=Press+Start+2P&family=VT323&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <style>
        @font-face {
            font-family: 'Terminal Grotesque';
            src: url('https://fontlibrary.org/face/terminal-grotesque') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        :root {
            --color-background: #f3f4f6;
            --color-surface: #ffffff;
            --color-text-main: #111827;
            --color-text-dim: #6b7280;
            --color-text-dark: #9ca3af;
            --color-highlight: #ca8a04;
            --color-legendary: #ca8a04;
            --color-primary: #4338ca;
            --color-accent: #dc2626;
        }
        html.dark {
            --color-background: #0f172a;
            --color-surface: #1e293b;
            --color-text-main: #f8fafc;
            --color-text-dim: #94a3b8;
            --color-text-dark: #64748b;
            --color-highlight: #fbbf24; /* amber-400 - bright gold */
            --color-legendary: #fbbf24; /* amber-400 - bright gold */
            --color-primary: #b388ff; /* light neon purple */
            --color-accent: #ff3b3b; /* bright saturated red */
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Press Start 2P"', 'cursive'],
                        serif: ['"Press Start 2P"', 'cursive'],
                        mono: ['"Press Start 2P"', 'cursive'],
                        clean: ['"-apple-system"', '"BlinkMacSystemFont"', '"SF Pro"', '"Segoe UI"', '"Roboto"', '"Helvetica Neue"', 'Arial', 'sans-serif'],
                    },
                    colors: {
                        'background': 'var(--color-background)',
                        'surface': 'var(--color-surface)',
                        'primary': 'var(--color-primary)',
                        'secondary': '#ddd6fe',
                        'secondary-hover': '#c4b5fd',
                        'accent': 'var(--color-accent)',
                        'accent-dark': '#b91c1c',
                        'highlight': 'var(--color-highlight)',
                        'text-main': 'var(--color-text-main)',
                        'text-dim': 'var(--color-text-dim)',
                        'text-dark': 'var(--color-text-dark)',
                        'text-light': '#f8fafc',
                        'success': '#16a34a',
                        'success-dark': '#15803d',
                        'common': '#6b7280',
                        'rare': '#4338ca',
                        'legendary': 'var(--color-legendary)',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(8px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        fadeInScale: {
                            '0%': { opacity: '0', transform: 'scale(0.95)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        slideDown: {
                            '0%': { opacity: '0', transform: 'translateY(-20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        scaleIn: {
                            '0%': { opacity: '0', transform: 'scale(0.9)' },
                            '60%': { transform: 'scale(1.02)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        },
                        popIn: {
                            '0%': { opacity: '0', transform: 'scale(0.8)' },
                            '50%': { transform: 'scale(1.05)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        },
                        gentleBounce: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-4px)' },
                        },
                        subtlePulse: {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0.85' },
                        },
                        shimmerSlide: {
                            '0%': { transform: 'translateX(-100%)' },
                            '100%': { transform: 'translateX(100%)' },
                        },
                        glowPulse: {
                            '0%, 100%': { boxShadow: '0 0 0 0 rgba(202, 138, 4, 0.4)' },
                            '50%': { boxShadow: '0 0 20px 4px rgba(202, 138, 4, 0.2)' },
                        },
                        successPop: {
                            '0%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(1.1)' },
                            '100%': { transform: 'scale(1)' },
                        },
                        wiggle: {
                            '0%, 100%': { transform: 'rotate(0deg)' },
                            '25%': { transform: 'rotate(-2deg)' },
                            '75%': { transform: 'rotate(2deg)' },
                        },
                        pulse: {
                            '0%, 100%': { opacity: '1', transform: 'scale(1)' },
                            '50%': { opacity: '.7', transform: 'scale(1.05)' },
                        },
                         shimmer: {
                            '0%': { backgroundPosition: '-1000px 0' },
                            '100%': { backgroundPosition: '1000px 0' },
                        },
                        reveal: {
                            '0%': { transform: 'scale(0.8) translateY(20px)', filter: 'blur(12px) brightness(3)', opacity: '0' },
                            '100%': { transform: 'scale(1) translateY(0)', filter: 'blur(0) brightness(1)', opacity: '1' },
                        },
                        blink: {
                           '50%': { opacity: '0' }
                        },
                        shake: {
                            '0%, 100%': { transform: 'translate(0, 0)' },
                            '10%, 90%': { transform: 'translate(-1.5px, -0.5px) rotate(-0.2deg)' },
                            '20%, 80%': { transform: 'translate(1.5px, 0.5px) rotate(0.2deg)' },
                            '30%, 50%, 70%': { transform: 'translate(-1.5px, 1.5px) rotate(-0.3deg)' },
                            '40%, 60%': { transform: 'translate(1.5px, -1.5px) rotate(0.3deg)' }
                        },
                        flash: {
                            '0%': { opacity: '0' },
                            '15%': { opacity: '1' },
                            '100%': { opacity: '0' },
                        },
                        burst: {
                            '0%': { transform: 'translate(0, 0) scale(1)', opacity: '1' },
                            '100%': { transform: 'translate(var(--tw-translate-x), var(--tw-translate-y)) scale(0)', opacity: '0' },
                        },
                        levelUp: {
                            '0%': { transform: 'scale(0) translateY(50px)', opacity: '0' },
                            '50%': { transform: 'scale(1.2) translateY(0)', opacity: '1' },
                            '100%': { transform: 'scale(1) translateY(0)', opacity: '1' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        orbit: {
                            'from': { transform: 'rotate(0deg) translateX(40px) rotate(0deg)' },
                            'to': { transform: 'rotate(360deg) translateX(40px) rotate(-360deg)' },
                        },
                        spinSlow: {
                            'from': { transform: 'rotate(0deg)' },
                            'to': { transform: 'rotate(360deg)' },
                        },
                        spinSlowReverse: {
                            'from': { transform: 'rotate(360deg)' },
                            'to': { transform: 'rotate(0deg)' },
                        },
                        flyToBestiary: {
                            '0%': { transform: 'translate(0, 0) scale(1)', opacity: '1', filter: 'brightness(2) blur(0px)' },
                            '20%': { transform: 'translate(20px, -40px) scale(1.1)', opacity: '1' },
                            '100%': { transform: 'translate(100px, 400px) scale(0.2)', opacity: '0', filter: 'brightness(5) blur(4px)' }
                        },
                        glowFlicker: {
                            '0%, 100%': { opacity: '0.4' },
                            '50%': { opacity: '1' }
                        },
                        // Genshin-style summon animations
                        meteorShoot: {
                            '0%': { transform: 'translateX(-100vw) translateY(-100vh) rotate(45deg)', opacity: '0' },
                            '10%': { opacity: '1' },
                            '90%': { opacity: '1' },
                            '100%': { transform: 'translateX(100vw) translateY(100vh) rotate(45deg)', opacity: '0' }
                        },
                        starBurst: {
                            '0%': { transform: 'scale(0) rotate(0deg)', opacity: '1' },
                            '50%': { transform: 'scale(1.5) rotate(180deg)', opacity: '1' },
                            '100%': { transform: 'scale(2) rotate(360deg)', opacity: '0' }
                        },
                        portalOpen: {
                            '0%': { transform: 'scale(0) rotate(-180deg)', opacity: '0', filter: 'blur(20px)' },
                            '50%': { transform: 'scale(1.2) rotate(0deg)', opacity: '1', filter: 'blur(0px)' },
                            '100%': { transform: 'scale(1) rotate(0deg)', opacity: '1', filter: 'blur(0px)' }
                        },
                        energyGather: {
                            '0%': { transform: 'scale(3) rotate(0deg)', opacity: '0' },
                            '100%': { transform: 'scale(0) rotate(360deg)', opacity: '1' }
                        },
                        wishRing: {
                            '0%': { transform: 'scale(0.5) rotateX(70deg)', opacity: '0', borderWidth: '8px' },
                            '50%': { transform: 'scale(1.5) rotateX(70deg)', opacity: '1', borderWidth: '4px' },
                            '100%': { transform: 'scale(2.5) rotateX(70deg)', opacity: '0', borderWidth: '1px' }
                        },
                        lightBeam: {
                            '0%': { transform: 'scaleY(0) translateY(100%)', opacity: '0' },
                            '30%': { transform: 'scaleY(1) translateY(0)', opacity: '1' },
                            '70%': { transform: 'scaleY(1) translateY(0)', opacity: '1' },
                            '100%': { transform: 'scaleY(0) translateY(-100%)', opacity: '0' }
                        },
                        glitterFall: {
                            '0%': { transform: 'translateY(-20px) rotate(0deg)', opacity: '0' },
                            '20%': { opacity: '1' },
                            '100%': { transform: 'translateY(100px) rotate(360deg)', opacity: '0' }
                        },
                        creatureReveal: {
                            '0%': { transform: 'scale(0) translateY(50px)', opacity: '0', filter: 'brightness(5) blur(20px)' },
                            '40%': { transform: 'scale(1.3) translateY(-20px)', opacity: '1', filter: 'brightness(2) blur(0)' },
                            '60%': { transform: 'scale(0.9) translateY(10px)', filter: 'brightness(1.2) blur(0)' },
                            '80%': { transform: 'scale(1.05) translateY(-5px)', filter: 'brightness(1) blur(0)' },
                            '100%': { transform: 'scale(1) translateY(0)', opacity: '1', filter: 'brightness(1) blur(0)' }
                        },
                        legendaryAura: {
                            '0%': { boxShadow: '0 0 20px 10px rgba(202, 138, 4, 0.8), 0 0 60px 30px rgba(202, 138, 4, 0.4)' },
                            '50%': { boxShadow: '0 0 40px 20px rgba(202, 138, 4, 1), 0 0 100px 50px rgba(202, 138, 4, 0.6)' },
                            '100%': { boxShadow: '0 0 20px 10px rgba(202, 138, 4, 0.8), 0 0 60px 30px rgba(202, 138, 4, 0.4)' }
                        },
                        rareAura: {
                            '0%': { boxShadow: '0 0 15px 8px rgba(67, 56, 202, 0.7), 0 0 40px 20px rgba(67, 56, 202, 0.3)' },
                            '50%': { boxShadow: '0 0 30px 15px rgba(67, 56, 202, 0.9), 0 0 70px 35px rgba(67, 56, 202, 0.5)' },
                            '100%': { boxShadow: '0 0 15px 8px rgba(67, 56, 202, 0.7), 0 0 40px 20px rgba(67, 56, 202, 0.3)' }
                        },
                        textGlow: {
                            '0%, 100%': { textShadow: '0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor' },
                            '50%': { textShadow: '0 0 20px currentColor, 0 0 40px currentColor, 0 0 60px currentColor' }
                        },
                        gradient: {
                            '0%, 100%': { backgroundPosition: '0% 50%' },
                            '50%': { backgroundPosition: '100% 50%' }
                        },
                        fadeOut: {
                            '0%': { opacity: '1' },
                            '100%': { opacity: '0' }
                        }
                    },
                    animation: {
                        fadeIn: 'fadeIn 0.5s ease-in-out',
                        fadeInScale: 'fadeInScale 0.3s ease-out',
                        slideUp: 'slideUp 0.4s ease-out',
                        slideDown: 'slideDown 0.4s ease-out',
                        scaleIn: 'scaleIn 0.35s ease-out',
                        popIn: 'popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)',
                        gentleBounce: 'gentleBounce 2s ease-in-out infinite',
                        subtlePulse: 'subtlePulse 2s ease-in-out infinite',
                        shimmerSlide: 'shimmerSlide 2s infinite',
                        glowPulse: 'glowPulse 2s ease-in-out infinite',
                        successPop: 'successPop 0.3s ease-out',
                        wiggle: 'wiggle 0.5s ease-in-out',
                        pulse: 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        shimmer: 'shimmer 2s infinite linear',
                        reveal: 'reveal 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards',
                        blink: 'blink 1s step-start infinite',
                        shake: 'shake 0.4s cubic-bezier(.36,.07,.19,.97) infinite',
                        flash: 'flash 0.8s ease-out',
                        burst: 'burst 1.2s ease-out forwards',
                        levelUp: 'levelUp 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards',
                        float: 'float 3s ease-in-out infinite',
                        spinSlow: 'spinSlow 8s linear infinite',
                        spinSlowReverse: 'spinSlowReverse 12s linear infinite',
                        flyToBestiary: 'flyToBestiary 1s cubic-bezier(0.45, 0, 0.55, 1) forwards',
                        glowFlicker: 'glowFlicker 0.2s infinite ease-in-out',
                        // Genshin-style summon animations
                        meteorShoot: 'meteorShoot 1.4s cubic-bezier(0.19, 1, 0.22, 1) forwards',
                        starBurst: 'starBurst 1.2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards',
                        portalOpen: 'portalOpen 0.8s ease-out forwards',
                        energyGather: 'energyGather 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards',
                        wishRing: 'wishRing 1.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards',
                        lightBeam: 'lightBeam 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards',
                        glitterFall: 'glitterFall 2s linear forwards',
                        creatureReveal: 'creatureReveal 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
                        legendaryAura: 'legendaryAura 1.5s ease-in-out infinite',
                        rareAura: 'rareAura 1.5s ease-in-out infinite',
                        textGlow: 'textGlow 1.5s ease-in-out infinite',
                        'gradient-slow': 'gradient 15s ease infinite',
                        fadeOut: 'fadeOut 0.5s ease-out forwards',
                    },
                    boxShadow: {
                        'card': '0 2px 8px -2px rgba(0, 0, 0, 0.1), 0 4px 12px -4px rgba(0, 0, 0, 0.08)',
                        'card-hover': '0 8px 24px -4px rgba(0, 0, 0, 0.15), 0 12px 32px -8px rgba(0, 0, 0, 0.1)',
                        'button': '0 2px 4px -1px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)',
                        'button-active': '0 1px 2px -1px rgba(0, 0, 0, 0.1)',
                        'glow-highlight': '0 0 20px -5px rgba(202, 138, 4, 0.4)',
                        'glow-primary': '0 0 20px -5px rgba(67, 56, 202, 0.4)',
                        'glow-success': '0 0 20px -5px rgba(22, 163, 74, 0.4)',
                        'inner-soft': 'inset 0 2px 4px -2px rgba(0, 0, 0, 0.05)',
                    },
                },
            },
        }
    </script>

<style>
    /* ── Comet Rite summon animation ─────────────────────────────── */
    @keyframes cometFlight {
        0%   { transform: translate(-52vw, 38vh) scale(0.45); opacity: 0; }
        6%   { opacity: 1; }
        26%  { transform: translate(-30vw, -10vh) scale(0.65); }
        44%  { transform: translate(-12vw, -25vh) scale(0.8); }
        56%  { transform: translate(-2vw, -29vh) scale(0.9); }
        66%  { transform: translate(4vw, -28vh) scale(0.95); }
        80%  { transform: translate(5vw, -17vh) scale(1); }
        100% { transform: translate(0vw, 0vh) scale(1.05); opacity: 1; }
    }
    @keyframes cometTail {
        0%, 44% { transform: translateY(-50%) rotate(26deg); }
        56%     { transform: translateY(-50%) rotate(6deg); }
        66%     { transform: translateY(-50%) rotate(-12deg); }
        100%    { transform: translateY(-50%) rotate(-72deg); }
    }
    @keyframes starTwinkle {
        0%, 100% { opacity: 0.15; }
        50%      { opacity: 0.9; }
    }
    @keyframes shockwave {
        0%   { transform: scale(0.2); opacity: 1; }
        100% { transform: scale(7);   opacity: 0; }
    }
    @keyframes bigCometFall {
        0%   { transform: translateY(-58vh) scale(0.5); opacity: 0; }
        12%  { opacity: 1; }
        100% { transform: translateY(0) scale(1.1); opacity: 1; }
    }
    @keyframes tripleFlash {
        0%, 55%, 70%, 86%, 100% { opacity: 0; }
        62% { opacity: 1; }
        78% { opacity: 0.9; }
        93% { opacity: 1; }
    }
    @keyframes skyWash {
        0%, 100% { opacity: 0.12; }
        50%      { opacity: 0.3; }
    }
    @keyframes silhouetteRise {
        0%   { transform: translateY(70px) scale(0.7); opacity: 0; filter: brightness(0); }
        60%  { transform: translateY(-8px) scale(1.03); opacity: 1; filter: brightness(0); }
        100% { transform: translateY(0) scale(1); opacity: 1; filter: brightness(0); }
    }
    @keyframes colorBurst {
        0%   { filter: brightness(0); }
        40%  { filter: brightness(2.6) saturate(0.6); }
        100% { filter: brightness(1) saturate(1); }
    }
    @keyframes stampIn {
        0%   { transform: scale(2.4); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }
    @keyframes slideUpFade {
        0%   { transform: translateY(18px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
    }
    .animate-cometFlight  { animation: cometFlight 2.05s linear forwards; }
    .animate-cometTail    { animation: cometTail 2.05s linear forwards; }
    .animate-starTwinkle  { animation: starTwinkle var(--twinkle-duration, 3s) ease-in-out var(--twinkle-delay, 0s) infinite; }
    .animate-shockwave    { animation: shockwave 0.7s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .animate-bigCometFall { animation: bigCometFall 1.15s cubic-bezier(0.55, 0, 0.85, 0.36) both; }
    .animate-tripleFlash  { animation: tripleFlash 1.5s linear both; }
    .animate-skyWash      { animation: skyWash 2.2s ease-in-out infinite; }
    .summon-silhouette    { animation: silhouetteRise 0.55s cubic-bezier(0.22, 1, 0.36, 1) both, colorBurst 0.55s ease-out 0.62s forwards; }
    .summon-burst-ring    { animation: shockwave 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.62s both; }
    .summon-stamp         { animation: stampIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.95s both; }
    .summon-rise          { animation: slideUpFade 0.45s cubic-bezier(0.22, 1, 0.36, 1) both; }
    @media (prefers-reduced-motion: reduce) {
        .animate-cometFlight, .animate-cometTail, .animate-bigCometFall { animation-duration: 0.01s; }
    }

    @keyframes drift {
        0% { transform: translateY(0) translateX(0); opacity: 0; }
        20% { opacity: 0.5; }
        80% { opacity: 0.5; }
        100% { transform: translateY(-100px) translateX(20px); opacity: 0; }
    }
    .aura-particle {
        animation: drift var(--duration) linear infinite both;
        animation-delay: var(--delay);
    }
    @keyframes shakeOnce {
        0%, 100% { transform: translate3d(0, 0, 0); }
        10%, 30%, 50%, 70%, 90% { transform: translate3d(-5px, 0, 0); }
        20%, 40%, 60%, 80% { transform: translate3d(5px, 0, 0); }
    }
    .shake-once {
        animation: shakeOnce 0.6s cubic-bezier(.36,.07,.19,.97) both;
    }
    @keyframes redFlash {
        0% { background-color: rgba(220, 38, 38, 0.15); border-color: rgba(220, 38, 38, 0.8); }
        100% { background-color: transparent; }
    }
    .red-flash {
        animation: redFlash 0.6s ease-out;
    }

    /* Safe area padding for notched devices (iPhone X+) */
    .pb-safe {
        padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .pt-safe {
        padding-top: env(safe-area-inset-top, 0px);
    }
    .pl-safe {
        padding-left: env(safe-area-inset-left, 0px);
    }
    .pr-safe {
        padding-right: env(safe-area-inset-right, 0px);
    }

    /* Prevent text selection and tap highlight on mobile */
    .touch-none {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
    }

    /* Smooth scrolling for iOS */
    .scroll-smooth {
        -webkit-overflow-scrolling: touch;
    }

    /* Hide scrollbar on mobile but keep functionality */
    .scrollbar-hide::-webkit-scrollbar {
        display: none;
    }
    .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }

    /* Minimum touch target size for accessibility */
    .touch-target {
        min-height: 44px;
        min-width: 44px;
    }

    /* Premium glass effect */
    .glass {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }
    html.dark .glass {
        background: var(--color-surface);
    }
    .glass-dark {
        background: rgba(0, 0, 0, 0.1);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }

    /* Smooth transitions */
    .transition-premium {
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes bgFlicker {
        0%, 100% {
            background-color: #0f172a;
        }
        25% {
            background-color: var(--flicker-color-1);
        }
        50% {
            background-color: #0f172a;
        }
        75% {
            background-color: var(--flicker-color-2);
        }
    }
    .animate-bgFlicker {
        animation: bgFlicker 0.25s linear infinite;
    }

    /* Press effect for buttons */
    .press-effect {
